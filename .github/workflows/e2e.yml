name: E2E

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  scaffold-and-boot:
    name: Scaffold project & boot Docker stack
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          tools: composer:v2

      - uses: ramsey/composer-install@v4

      - name: Scaffold project
        run: bin/symfinit e2e-app --path="$RUNNER_TEMP"

      # `symfinit` itself runs `docker compose up --wait`, which already blocks
      # until the php container's HEALTHCHECK passes and fails the step above
      # if it doesn't within Compose's default timeout. This step is a second,
      # outside-in check that the stack actually serves traffic. A fresh
      # skeleton has no routes configured, so a 404 is an expected response —
      # we only care that the server answered at all.
      - name: Smoke test app
        working-directory: ${{ runner.temp }}/e2e-app
        run: |
          for i in $(seq 1 30); do
            status=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost || echo "000")
            if [ "$status" != "000" ]; then
              echo "App responded with HTTP $status"
              exit 0
            fi
            sleep 2
          done
          echo "App never responded"
          exit 1

      - name: Stop Docker stack
        if: always()
        working-directory: ${{ runner.temp }}/e2e-app
        run: docker compose down -v